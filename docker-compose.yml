version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-translator
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - translator-net

  translator:
    build: .
    container_name: translate-app
    ports:
      - "7860:7860"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - translator-net

volumes:
  ollama_data:

networks:
  translator-net:
    driver: bridge
